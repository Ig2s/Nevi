<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.2.0/dist/aframe-extras.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./marker.mind; autoStart: false; uiError:no; uiLoading:no; uiScanning:no;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" renderer="colorManagement: true;">
        <a-assets>
            
        </a-assets>
        
        <a-entity light="type: directional; castShadow: true; intensity: 1;" position="1 1 5"></a-entity>
        <a-entity light="type: ambient; intensity: 0.5;"></a-entity>
        
        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="near: 10; far: 10000; objects: .clickable"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model
                src="./asset.glb"
                scale="0.55 0.55 0.55"
                position="0 0 -0.02"
                rotation="90 0 0"
                
            >
            
            </a-gltf-model>
            
        </a-entity>
    </a-scene>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sceneEl = document.querySelector('a-scene');
            let arSystemRunning = false;
            
            sceneEl.addEventListener('loaded', function () {
                const arSystem = sceneEl.systems['mindar-image-system'];
                if (arSystem && arSystem.start && !arSystemRunning) {
                    arSystem.start();
                    arSystemRunning = true;
                }
                
            });
        });
    </script>
</body>
</html>
