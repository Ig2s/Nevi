<!DOCTYPE html>
<html lang="es">
<head>
    <title>Visor AR Profesional - Guillermo Gomez</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            max-width: 100%;
            max-height: 100%;
            --poster-color: transparent; 
        }

        #ar-button {
            background-image: url(https://modelviewer.dev/shared-assets/icons/ar_icon.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #ffffff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 70px; 
            padding: 0px 24px 0px 48px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            color: #4285f4;
            height: 50px;
            line-height: 50px;
            border-radius: 25px;
            border: 2px solid #4285f4;
            display: block !important;
            z-index: 9999;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <model-viewer 
        id="visor-arquitectura"
        src="untitled_optimized.glb"
        ar 
        ar-modes="scene-viewer" 
        ar-scale="fixed"
        ar-placement="floor"
        shadow-intensity="2"
        shadow-softness="0.2"
        exposure="1.2"
        interaction-prompt="none"
        camera-controls>
        
        <button slot="ar-button" id="ar-button">
            VER CABAÑA EN TAMAÑO REAL 1:1
        </button>

    </model-viewer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const viewer = document.querySelector('#visor-arquitectura');
            const button = document.querySelector('#ar-button');

            button.addEventListener('click', () => {
                // Generamos la URL absoluta del archivo en GitHub Pages
                const modelUrl = new URL(viewer.src, window.location.href).href;
                
                /*
                  EL TRUCO TÉCNICO COMPLETO:
                  Inyectamos '&resizable=false' para que Scene Viewer deshabilite los dedos del usuario.
                  Inyectamos '&disable_scaling=1' para apagar el algoritmo de Google que achica la arquitectura.
                */
                const sceneViewerUrl = `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(modelUrl)}&mode=ar_only&resizable=false&disable_scaling=1#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;end;`;
                
                // Forzamos al sistema operativo a saltar directamente al motor calibrado
                window.location.href = sceneViewerUrl;
            });
        });
    </script>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script nomodule src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer-legacy.js"></script>
</body>
</html>
