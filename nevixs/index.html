<!DOCTYPE html>
<html lang="es">
<head>
    <title>Visor AR Profesional - Guillermo Gomez</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Estilos para que el visor ocupe toda la pantalla del móvil */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
        }

        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            --poster-color: transparent; 
        }

        /* Diseño del botón AR optimizado para que no choque con la navegación del celular */
        #ar-button {
            background-image: url(https://modelviewer.dev/shared-assets/icons/ar_icon.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #ffffff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            /* Posición elevada a 120px para evitar barras del sistema */
            bottom: 120px; 
            padding: 0px 16px 0px 40px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            font-weight: bold;
            color: #4285f4;
            height: 44px;
            line-height: 44px;
            border-radius: 22px;
            border: 1px solid #DADCE0;
            display: block !important;
            z-index: 9999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #ar-button:active { background-color: #f1f3f4; }
    </style>
</head>
<body>

    <!-- 
        VISOR OPTIMIZADO:
        - src: Nombre de tu archivo .glb
        - ar-scale="fixed": Mantiene la escala 1:1 arquitectónica.
        - bounds="tight": Evita que el modelo desaparezca al ajustar la cámara a sus límites.
        - exposure="1": Mejora la iluminación de los materiales.
    -->
    <model-viewer 
        src="untitled_optimized.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed"
        ar-placement="floor"
        camera-controls 
        auto-rotate
        shadow-intensity="1" 
        exposure="1"
        bounds="tight"
        min-camera-orbit="auto auto auto"
        max-camera-orbit="auto auto auto"
        interaction-prompt="auto">
        
        <button slot="ar-button" id="ar-button">
            VER CASA EN TAMAÑO REAL
        </button>

    </model-viewer>

    <!-- Script oficial de Model Viewer (Versión estable 3.4.0) -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</body>
</html>
