<!DOCTYPE html>
<html lang="es">
<head>
    <title>Visor AR - Guillermo Gomez</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #ffffff; }
        model-viewer { width: 100vw; height: 100vh; }

        /* AJUSTE DE POSICIÓN DEL BOTÓN */
        #ar-button {
            background-image: url(https://modelviewer.dev/shared-assets/icons/ar_icon.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            /* Subimos a 120px para que no lo tape la barra de Android de tu foto */
            bottom: 120px; 
            padding: 0px 16px 0px 40px;
            font-family: Roboto Regular, Helvetica Neue, sans-serif;
            font-size: 14px;
            color: #4285f4;
            height: 42px;
            line-height: 42px;
            border-radius: 21px;
            border: 1px solid #DADCE0;
            display: block !important;
            z-index: 9999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- 
        NUEVO AJUSTE: He añadido scale="100 100 100" 
        Si la casa sale muy pequeña, cambia esos 10 por números más altos.
    -->
    <model-viewer 
        src="untitled_optimized.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed"
        ar-placement="floor"
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1" 
        exposure="1"
        scale="100 100 100">
        
        <button slot="ar-button" id="ar-button">
            VER CASA EN TU TERRENO
        </button>

    </model-viewer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</body>
</html>
