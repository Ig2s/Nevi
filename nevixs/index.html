<!DOCTYPE html>
<html lang="es">
<head>
    <title>Visor AR Profesional - Guillermo Gomez</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
        }

        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            --poster-color: transparent; 
        }

        #ar-button {
            background-image: url(https://modelviewer.dev/shared-assets/icons/ar_icon.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #ffffff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 120px; 
            padding: 0px 16px 0px 40px;
            font-family: sans-serif;
            font-size: 14px;
            font-weight: bold;
            color: #4285f4;
            height: 44px;
            line-height: 44px;
            border-radius: 22px;
            border: 1px solid #DADCE0;
            display: block !important;
            z-index: 9999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <!-- 
        MODIFICACIÓN DE ESCALA:
        Si el modelo se mueve mucho o es muy grande/pequeño, 
        cambia los valores en scale="1 1 1". 
        Ejemplo: "0.5 0.5 0.5" para la mitad de tamaño, o "10 10 10" para 10 veces más grande.
    -->
    <model-viewer 
        src="untitled_optimized.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed"
        ar-placement="floor"
        camera-controls 
        auto-rotate
        shadow-intensity="1" 
        exposure="1"
        bounds="tight"
        scale="1 1 1"
        interaction-prompt="auto">
        
        <button slot="ar-button" id="ar-button">
            VER CASA EN TAMAÑO REAL
        </button>

    </model-viewer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</body>
</html>
