<!doctype html>
<html lang="es">
  <head>
    <title>Visor 3D Guillermo Gomez</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- El CSS es opcional si solo quieres el visor a pantalla completa -->
    <style>
      body { margin: 0; }
      model-viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
      #ar-button {
          background-color: white;
          border-radius: 8px;
          border: none;
          position: absolute;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          padding: 12px 20px;
          font-family: sans-serif;
          font-weight: bold;
          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      }
    </style>
  </head>
  <body>
    
    <model-viewer 
        src="untitled_optimized.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed" 
        camera-controls 
        tone-mapping="neutral" 
        shadow-intensity="1" 
        exposure="1">
      
      <button slot="ar-button" id="ar-button">
          👋 Ver en tamaño real
      </button>

    </model-viewer>  

    <!-- RECUERDA: Se cambió {{MODELVIEWER_VERSION}} por 3.4.0 -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  </body>
</html>
