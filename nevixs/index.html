<!DOCTYPE html>
<html lang="es">
<head>
    <title>Visor AR - Guillermo Gomez</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* Estilo para que el visor ocupe toda la pantalla */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
        }

        model-viewer {
            width: 100vw;
            height: 100vh;
        }

        /* Diseño del botón de Realidad Aumentada */
        #ar-button {
            background-image: url(https://modelviewer.dev/shared-assets/icons/ar_icon.png);
            background-repeat: no-repeat;
            background-size: 20px 20px;
            background-position: 12px 50%;
            background-color: #fff;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            bottom: 30px;
            padding: 0px 16px 0px 40px;
            font-family: Roboto Regular, Helvetica Neue, sans-serif;
            font-size: 14px;
            color: #4285f4;
            height: 42px;
            line-height: 42px;
            border-radius: 21px;
            border: 1px solid #DADCE0;
            display: block; /* Forzado para que se vea */
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #ar-button:active {
            background-color: #E8EAED;
        }

        #ar-button:focus {
            outline: none;
        }

        #ar-button:focus-visible {
            outline: 1px solid #4285f4;
        }
    </style>
</head>
<body>

    <!-- 
        CONFIGURACIÓN DEL VISOR:
        - src: nombre de tu archivo 3D
        - ar: activa la realidad aumentada
        - ar-modes: compatibilidad con Android e iOS
        - ar-scale="fixed": MANTIENE EL TAMAÑO REAL DE LA CASA
        - ar-placement="floor": coloca la casa en el suelo
    -->
    <model-viewer 
        src="untitled_optimized.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed"
        ar-placement="floor"
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1" 
        exposure="1">
        
        <button slot="ar-button" id="ar-button">
            VER CASA EN TU TERRENO
        </button>

    </model-viewer>

    <!-- Script de Google que hace que todo funcione -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</body>
</html>
